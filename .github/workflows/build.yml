name: Build luci-app-maccloner

on:
#  push:
#    branches: [ main, master ]
#  pull_request:
#    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for mvebu/cortexa9
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [mvebu_cortexa9]
        include:
          - arch: mvebu_cortexa9
            target: mvebu
            subtarget: cortexa9

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build IPK package
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: packages_ci
        with:
          target: ${{ matrix.target }}
          subtarget: ${{ matrix.subtarget }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_${{ matrix.arch }}.ipk
          path: bin/packages/${{ matrix.arch }}/packages_ci/luci-app-maccloner_*.ipk
