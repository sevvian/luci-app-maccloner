name: Build luci-app-maccloner for ImmortalWrt 24.10.4

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for mvebu/cortexa9 (ImmortalWrt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package with ImmortalWrt SDK
        uses: openwrt/gh-action-sdk@v7
        env:
          # Build only your package – avoids compiling the entire feed
          PACKAGES: luci-app-maccloner
          # ImmortalWrt SDK image and version tag
          CONTAINER: ghcr.io/immortalwrt/sdk
          ARCH: mvebu-cortexa9-24.10.4
          # Do NOT set INDEX=1 – index generation is broken in the action v7
          # and not needed for a single package.

      - name: Collect the IPK
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_immortalwrt_24.10.4_mvebu_cortexa9.ipk
          path: release/*.ipk
