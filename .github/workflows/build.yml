name: Build and Release luci-app-maccloner

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build for mvebu/cortexa9
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [mvebu_cortexa9]
        include:
          - arch: mvebu_cortexa9
            target: mvebu
            subtarget: cortexa9

    steps:
      - uses: actions/checkout@v4

      - name: Build IPK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: packages_ci
        with:
          target: ${{ matrix.target }}
          subtarget: ${{ matrix.subtarget }}

      - name: Rename artifact for release
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: release/luci-app-maccloner_*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
