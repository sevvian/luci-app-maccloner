name: Build luci-app-maccloner for OpenWrt 24.10

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }} on ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linksys WRT32X / WRT3200ACM
          - version: openwrt-24.10
            target: mvebu-cortexa9
          # Raspberry Pi 4B (also works with ImmortalWrt 24.10)
          - version: openwrt-24.10
            target: bcm27xx-bcm2711

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build IPK package
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.target }}-${{ matrix.version }}
          FEEDNAME: local
          INDEX: 1

      - name: Collect built packages
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_${{ matrix.target }}_${{ matrix.version }}.ipk
          path: release/*.ipk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
