name: Build luci-app-maccloner for OpenWrt 24.10

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linksys WRT32X (mvebu/cortexa9)
          - target: mvebu-cortexa9
          # Raspberry Pi 4B (bcm27xx/bcm2711)
          - target: bcm27xx-bcm2711

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build only luci-app-maccloner
        uses: openwrt/gh-action-sdk@v7
        env:
          # This is the critical line: tell the SDK to build ONLY your package
          PACKAGES: luci-app-maccloner
          ARCH: ${{ matrix.target }}-openwrt-24.10.4
          #INDEX: 1

      - name: Collect the IPK
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_${{ matrix.target }}.ipk
          path: release/*.ipk
