name: Build luci-app-maccloner for OpenWrt 24.10 (mvebu-cortexa9)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for mvebu/cortexa9
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v7
        env:
          PACKAGES: luci-app-maccloner
          ARCH: mvebu-cortexa9-24.10.4   # ✅ Valid tag for your device
          # No CONTAINER override needed – defaults to openwrt/sdk
          # No INDEX=1 – avoids the known index‑generation bug

      - name: Collect the IPK
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_openwrt_24.10.4_mvebu_cortexa9.ipk
          path: release/*.ipk
