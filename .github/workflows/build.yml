name: Build luci-app-maccloner for ImmortalWrt 24.10

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build for mvebu/cortexa9
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package with ImmortalWrt SDK
        uses: immortalwrt/gh-action-sdk@master
        env:
          PACKAGES: luci-app-maccloner
          ARCH: mvebu-cortexa9-24.10.4 # Verify the exact tag name

      - name: Collect the IPK
        run: |
          mkdir -p release
          find bin/packages -name "luci-app-maccloner_*.ipk" -exec cp {} release/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-maccloner_immortalwrt_mvebu_cortexa9.ipk
          path: release/*.ipk
